{{- /*
CRDs, templated (not Helm's install-only crds/ dir) so `helm upgrade` keeps
them current with the release. The raw, controller-gen-generated CRDs live in
crd-bases/ (written by `make manifests`, guarded by ci.yml's codegen-drift
gate); we round-trip each through fromYaml/toYaml to inject the
helm.sh/resource-policy:keep annotation, which stops `helm uninstall` from
deleting the CRDs — that would cascade-delete every EtcdCluster and its data.
*/ -}}
{{- if .Values.crds.enabled }}
{{- range $path, $_ := .Files.Glob "crd-bases/*.yaml" }}
{{- $crd := $.Files.Get $path | fromYaml }}
{{- if $.Values.crds.keep }}
{{- $_ := set $crd.metadata "annotations" (merge (dict "helm.sh/resource-policy" "keep") (default (dict) $crd.metadata.annotations)) }}
{{- end }}
---
{{ toYaml $crd }}
{{- end }}
{{- end }}
