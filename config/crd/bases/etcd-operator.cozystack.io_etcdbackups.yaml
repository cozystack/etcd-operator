---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: etcdbackups.etcd-operator.cozystack.io
spec:
  group: etcd-operator.cozystack.io
  names:
    kind: EtcdBackup
    listKind: EtcdBackupList
    plural: etcdbackups
    singular: etcdbackup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef.name
      name: Cluster
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          EtcdBackup is the Schema for the etcdbackups API. It captures a one-shot
          snapshot of an EtcdCluster to a destination (S3 or PVC).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              EtcdBackupSpec defines a one-shot etcd snapshot of a cluster to a
              destination. Backups are immutable: change the destination by creating a
              new EtcdBackup.
            properties:
              clusterRef:
                description: ClusterRef names the EtcdCluster (same namespace) to
                  snapshot.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              destination:
                description: Destination selects where the snapshot is stored (S3
                  or PVC).
                properties:
                  pvc:
                    description: PVC stores the snapshot on a PersistentVolumeClaim.
                    properties:
                      claimName:
                        description: ClaimName is the name of a PVC in the cluster's
                          namespace.
                        minLength: 1
                        type: string
                      subPath:
                        description: SubPath is an optional subdirectory within the
                          volume.
                        type: string
                    required:
                    - claimName
                    type: object
                  s3:
                    description: S3 stores the snapshot in an S3-compatible object
                      store.
                    properties:
                      bucket:
                        description: Bucket is the destination bucket.
                        minLength: 1
                        type: string
                      credentialsSecretRef:
                        description: |-
                          CredentialsSecretRef references a Secret in the cluster's namespace
                          holding AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY keys.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      endpoint:
                        description: |-
                          Endpoint is the S3 endpoint URL (e.g. "https://s3.amazonaws.com" or a
                          MinIO/Ceph endpoint).
                        minLength: 1
                        type: string
                      forcePathStyle:
                        description: |-
                          ForcePathStyle selects path-style addressing (bucket in the path
                          rather than the host). MinIO/Ceph typically require true.
                        type: boolean
                      key:
                        description: |-
                          Key is an optional object-key prefix within the bucket. The operator
                          appends "<backup-name>.db".
                        type: string
                      region:
                        description: Region is the S3 region. Optional for endpoints
                          that ignore it.
                        type: string
                    required:
                    - bucket
                    - credentialsSecretRef
                    - endpoint
                    type: object
                type: object
                x-kubernetes-validations:
                - message: exactly one of destination.s3 or destination.pvc must be
                    set
                  rule: has(self.s3) != has(self.pvc)
            required:
            - clusterRef
            - destination
            type: object
          status:
            description: EtcdBackupStatus is the observed state of an EtcdBackup.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: Phase is the high-level lifecycle phase.
                type: string
              snapshot:
                description: Snapshot is populated once the backup completes.
                properties:
                  checksum:
                    description: Checksum is "<algo>:<hex>", e.g. "sha256:abc123...".
                    type: string
                  sizeBytes:
                    description: SizeBytes is the snapshot size in bytes.
                    format: int64
                    type: integer
                  uri:
                    description: |-
                      URI is the full snapshot location, e.g. "s3://bucket/key.db" or
                      "file:///backup/data/name.db".
                    type: string
                required:
                - uri
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
